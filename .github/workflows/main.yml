name: Daily Tarot Scraper

# This section tells GitHub WHEN to run the robot
on:
  schedule:
    # This cron schedule runs the script every day at midnight UTC
    - cron: '0 0 * * *' 
  workflow_dispatch: 
    # This allows you to manually click a "Run workflow" button in GitHub to test it immediately

jobs:
  build-and-log:
    runs-on: ubuntu-latest # This is the operating system the GitHub server will use
    
    # We need to give the robot permission to save the CSV file back to your repo
    permissions:
      contents: write 

    steps:
      # Step 1: Get the files from your repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Install Python on the GitHub server
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Step 3: Install the requests library we used in the script
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # Step 4: Run your actual Python script
      - name: Run Tarot API script
        run: python api_integration.py

      # Step 5: Save the updated CSV file and push it back to GitHub
      - name: Commit and push updated CSV
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data_log.csv
          # The next line prevents an error if the script runs but no new data was added
          git diff --quiet && git diff --staged --quiet || git commit -m "Automated daily tarot log update"
          git push
